<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Страница не найдена — INDEX Systems</title>
<meta name="robots" content="noindex, follow">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#F1F0ED;--ink:#181818;--muted:#8C8983;--line:#D6D3CC;--accent:#5E6AD2;
  }
  html,body{height:100%;}
  body{
    font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);
    display:flex;align-items:center;justify-content:center;
    text-align:center;padding:24px;
  }
  .wrap404{max-width:420px;}
  .code{
    font-family:'Space Grotesk',sans-serif;font-weight:700;
    font-size:clamp(64px,14vw,108px);line-height:1;
    color:var(--ink);margin-bottom:8px;
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .code .dot{color:var(--accent);}
  h1{
    font-family:'Space Grotesk',sans-serif;font-weight:600;
    font-size:clamp(18px,3vw,22px);margin:16px 0 28px;color:var(--ink);
  }
  .back-btn{
    display:inline-flex;align-items:center;gap:10px;
    border:1px solid var(--ink);border-radius:999px;
    padding:14px 28px;
    font-size:12.5px;letter-spacing:0.12em;text-transform:uppercase;font-weight:600;
    color:var(--ink);text-decoration:none;
    transition:background .25s,color .25s;
  }
  .back-btn:hover{background:var(--ink);color:var(--bg);}
</style>
</head>
<body>
  <div class="wrap404">
    <div class="code">4<span class="dot">0</span>4</div>
    <h1>Страница не найдена</h1>
    <a href="/" class="back-btn">Вернуться на главную</a>
  </div>
</body>
</html>
