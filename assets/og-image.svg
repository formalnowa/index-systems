<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#F1F0ED"/>
  <!-- subtle grid -->
  <g stroke="#D6D3CC" stroke-width="1" opacity="0.5">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>
  <!-- dark panel left -->
  <rect x="80" y="80" width="280" height="470" rx="8" fill="#0E0E18"/>
  <g stroke="#1E1E32" stroke-width="0.8">
    <line x1="80" y1="180" x2="360" y2="180"/>
    <line x1="80" y1="280" x2="360" y2="280"/>
    <line x1="80" y1="380" x2="360" y2="380"/>
    <line x1="80" y1="480" x2="360" y2="480"/>
  </g>
  <!-- ECG line -->
  <path d="M80 300 H140 L155 300 L168 260 L182 340 L195 220 L210 380 L225 300 H280 L295 270 L310 330 L325 300 H360"
    fill="none" stroke="#9DA8FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="195" cy="220" r="5" fill="#5E6AD2"/>

  <!-- Wordmark -->
  <text x="430" y="290" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="100" fill="#181818">INDEX<tspan fill="#5E6AD2">.</tspan></text>
  <text x="432" y="345" font-family="Inter, sans-serif" font-weight="500" font-size="24" letter-spacing="1" fill="#8C8983">SYSTEMS</text>

  <!-- tagline -->
  <text x="432" y="410" font-family="Inter, sans-serif" font-weight="400" font-size="26" fill="#4A4844">Сайты, SEO и реклама</text>
  <text x="432" y="446" font-family="Inter, sans-serif" font-weight="400" font-size="26" fill="#4A4844">для клиник и экспертных проектов</text>

  <!-- accent dot row -->
  <circle cx="432" cy="500" r="5" fill="#5E6AD2"/>
  <text x="452" y="507" font-family="Inter, sans-serif" font-size="18" letter-spacing="1" fill="#8C8983">INDEX-SYSTEMS.RU</text>
</svg>
